<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watermelon Game HQ</title>
  <meta name="description" content="GitHub Pages에서 바로 실행되는 고퀄리티 수박 게임" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="page">
    <aside class="panel panel-left">
      <div class="brand">
        <div class="brand-badge">🍉</div>
        <div>
          <h1>Watermelon Game HQ</h1>
          <p>가볍고 부드럽게 돌아가도록 최적화한 브라우저 수박 게임</p>
        </div>
      </div>

      <section class="card score-card">
        <div class="score-row">
          <span>점수</span>
          <strong id="score">0</strong>
        </div>
        <div class="score-row">
          <span>최고 기록</span>
          <strong id="bestScore">0</strong>
        </div>
        <div class="score-row">
          <span>다음 과일</span>
          <div id="nextFruitBadge" class="fruit-badge">🍒</div>
        </div>
      </section>

      <section class="card controls-card">
        <h2>조작법</h2>
        <ul>
          <li>마우스 / 터치: 위치 이동</li>
          <li>클릭 / 탭 / 스페이스: 과일 떨어뜨리기</li>
          <li>R: 다시 시작</li>
          <li>P: 일시정지</li>
        </ul>
      </section>

      <section class="card legend-card">
        <h2>합체 순서</h2>
        <div id="legend" class="legend"></div>
      </section>
    </aside>

    <main class="board-wrap">
      <div class="board-topbar">
        <div class="pill">GitHub Pages Ready</div>
        <div class="pill">60 FPS 지향</div>
        <div class="pill">모바일 지원</div>
      </div>

      <div class="canvas-shell">
        <canvas id="game" width="480" height="760" aria-label="수박 게임 캔버스"></canvas>
        <div id="overlay" class="overlay hidden">
          <div class="overlay-card">
            <div id="overlayTitle" class="overlay-title">Game Over</div>
            <div class="overlay-score">
              <span>최종 점수</span>
              <strong id="finalScore">0</strong>
            </div>
            <button id="restartButton" class="primary-btn">다시 시작</button>
          </div>
        </div>
      </div>

      <div class="board-bottom">
        <button id="dropButton" class="secondary-btn">과일 떨어뜨리기</button>
        <button id="pauseButton" class="secondary-btn">일시정지</button>
        <button id="resetButton" class="secondary-btn danger">리셋</button>
      </div>
    </main>
  </div>

  <script src="./game.js"></script>
</body>
</html>
