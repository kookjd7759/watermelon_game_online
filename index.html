<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watermelon Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="brand-icon">🍉</span> playSuikaGame</div>
  </header>

  <main class="layout">
    <aside class="panel left-panel">
      <section class="bubble score-bubble">
        <h2>스코어</h2>
        <div class="score-value" id="score">0</div>
        <div class="best-label">최고 점수</div>
        <div class="best-value" id="bestScore">0</div>
      </section>

      <section class="leaderboard card">
        <h3>리더보드</h3>
        <div class="tabs">
          <button class="active" type="button">매일</button>
          <button type="button">매주</button>
          <button type="button">매월</button>
        </div>
        <ol class="ranking-list">
          <li class="gold"><span>1</span><strong>27429</strong></li>
          <li class="silver"><span>2</span><strong>24013</strong></li>
          <li class="bronze"><span>3</span><strong>23334</strong></li>
          <li><span>4</span><strong>23030</strong></li>
          <li><span>5</span><strong>19611</strong></li>
        </ol>
      </section>
    </aside>

    <section class="center-panel">
      <div class="mascot">☁️</div>
      <div class="preview-fruit" id="previewFruit">🍒</div>

      <div class="board-shell">
        <canvas id="gameCanvas" width="420" height="640"></canvas>
        <div class="overlay hidden" id="gameOverOverlay">
          <div class="overlay-card">
            <h2>게임 오버</h2>
            <p>최종 점수 <strong id="finalScore">0</strong></p>
            <button id="restartBtn" type="button">다시 시작</button>
          </div>
        </div>
      </div>

      <div class="controls card">
        <div>마우스/터치로 위치 이동 · 클릭/탭으로 떨어뜨리기</div>
        <div><strong>R</strong> 다시 시작 · <strong>← →</strong> 이동 · <strong>Space</strong> 드롭</div>
      </div>
    </section>

    <aside class="panel right-panel">
      <section class="bubble next-bubble">
        <h2>다음</h2>
        <div class="next-value" id="nextFruit">🍒</div>
      </section>

      <section class="ring-box">
        <h3>신기의 고리</h3>
        <div class="fruit-ring">
          <span>🟢</span><span>🍒</span><span>🍓</span><span>🫐</span><span>🍊</span>
          <span>🍎</span><span>🍐</span><span>🍑</span><span>🍍</span><span>🍈</span>
        </div>
      </section>
    </aside>
  </main>

  <script src="game.js"></script>
</body>
</html>
