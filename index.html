<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watermelon Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="panel left-panel">
      <h1>🍉 Watermelon Game</h1>
      <p class="subtitle">같은 과일을 합쳐 더 큰 과일을 만들고, 수박까지 도달해 보세요.</p>

      <div class="score-wrap">
        <div class="score-card">
          <span class="label">점수</span>
          <strong id="score">0</strong>
        </div>
        <div class="score-card">
          <span class="label">최고 기록</span>
          <strong id="bestScore">0</strong>
        </div>
      </div>

      <div class="controls">
        <button id="startBtn">새 게임</button>
        <button id="restartBtn">다시 시작</button>
        <button id="muteBtn">사운드: OFF</button>
      </div>

      <div class="guide">
        <h2>조작 방법</h2>
        <ul>
          <li>마우스를 움직여 과일 떨어질 위치를 정합니다.</li>
          <li>클릭 또는 스페이스바로 과일을 떨어뜨립니다.</li>
          <li>같은 단계 과일이 닿으면 합쳐져 더 큰 과일이 됩니다.</li>
          <li>과일이 상단 위험선 위에서 오래 버티면 게임 오버입니다.</li>
        </ul>
      </div>
    </section>

    <section class="game-section">
      <div class="game-header">
        <div>
          <span class="mini-label">다음 과일</span>
          <div class="next-preview" id="nextPreview"></div>
        </div>
        <div class="status" id="statusText">준비 완료</div>
      </div>

      <div class="game-wrap">
        <canvas id="gameCanvas" width="420" height="720"></canvas>
        <div class="danger-line"></div>
        <div class="drop-indicator" id="dropIndicator"></div>
        <div class="overlay hidden" id="gameOverOverlay">
          <div class="overlay-card">
            <h2>게임 오버</h2>
            <p id="finalScoreText">최종 점수: 0</p>
            <button id="playAgainBtn">다시 하기</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
