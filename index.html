<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watermelon Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="brand-icon">🍉</span> playSuikaGame</div>
  </header>

  <main class="app-shell">
    <aside class="side left-panel">
      <section class="score-bubble glass-bubble">
        <h2>스코어</h2>
        <div id="score" class="big-score">0</div>
        <div class="best-wrap">
          <span>최고 점수</span>
          <strong id="bestScore">0</strong>
        </div>
      </section>

      <section class="leaderboard card">
        <h3>리더보드</h3>
        <div class="board-tabs">
          <button class="tab active">매일</button>
          <button class="tab">매주</button>
          <button class="tab">매월</button>
        </div>
        <ol class="board-list">
          <li class="rank-1"><span>1</span><strong>27429</strong></li>
          <li class="rank-2"><span>2</span><strong>24013</strong></li>
          <li class="rank-3"><span>3</span><strong>23334</strong></li>
          <li><span>4</span><strong>23030</strong></li>
          <li><span>5</span><strong>19611</strong></li>
        </ol>
      </section>
    </aside>

    <section class="center-panel">
      <div class="mascot">☁️</div>
      <div class="drop-preview" id="dropPreview">🍒</div>
      <div class="game-wrap">
        <canvas id="gameCanvas" width="420" height="640" aria-label="수박 게임"></canvas>
        <div class="guide-line"></div>
        <div class="overlay hidden" id="gameOverOverlay">
          <div class="overlay-card">
            <h2>게임 오버</h2>
            <p>최종 점수 <strong id="finalScore">0</strong></p>
            <button id="restartBtn">다시 시작</button>
          </div>
        </div>
      </div>
      <div class="controls-card card compact">
        <div><strong>조작:</strong> 마우스/터치로 이동 · 클릭/탭으로 떨어뜨리기</div>
        <div><strong>R</strong> 다시 시작</div>
      </div>
    </section>

    <aside class="side right-panel">
      <section class="next-bubble glass-bubble">
        <h2>다음</h2>
        <div id="nextFruit" class="next-fruit">🍒</div>
      </section>

      <section class="ring-card">
        <h3>신기의 고리</h3>
        <div class="fruit-ring">
          <span>🟢</span><span>🍒</span><span>🍓</span><span>🫐</span><span>🍊</span>
          <span>🍎</span><span>🍐</span><span>🍑</span><span>🍍</span><span>🍈</span>
        </div>
      </section>
    </aside>
  </main>

  <script src="game.js"></script>
</body>
</html>
